{% extends 'base.html' %}
{% block title %}Thanks | {{ business_name }}{% endblock %}
{% block content %}
<section class="simple-page">
  <div class="container narrow card center">
    <h1>Thanks, {{ name }}.</h1>
    <p>Your request was sent. Call now if you want the fastest response.</p>
    <a class="btn btn-primary" href="tel:{{ phone_tel }}">Call {{ phone_display }}</a>
    <a class="btn btn-secondary" href="{{ url_for('index') }}">Back to Home</a>
  </div>
</section>
{% endblock %}
